# Pinta LLM-Configuration für pytaskforce.
#
# Pinta unterstützt sowohl Azure OpenAI als auch plain OpenAI. Der
# aktive Alias wird zur Laufzeit von `factory.warm_factory()` gesetzt
# (basierend auf `settings.llm_provider`), sodass dieselbe Config für
# beide Provider funktioniert.
#
# Provider-Wahl:
#   - LLM_PROVIDER=azure   → "main" wird auto-aktiviert (azure/gpt-5.4-mini)
#   - LLM_PROVIDER=openai  → "openai-main" wird auto-aktiviert (openai/gpt-4o-mini)
#   - sonst Auto-Detect anhand der gesetzten .env-Keys (Azure hat Vorrang).

# Wird von factory.warm_factory() überschrieben — der Wert hier ist nur
# der Fallback, falls Pinta die Config aus irgendeinem Grund nicht patched.
default_model: "main"

models:
  # ── Azure OpenAI ──────────────────────────────────────────────────
  main: "azure/gpt-5.4-mini"
  fast: "azure/gpt-5.4-nano"
  powerful: "azure/gpt-5.4-mini"
  legacy: "azure/gpt-4.1"

  # ── plain OpenAI ──────────────────────────────────────────────────
  openai-main: "openai/gpt-4o-mini"
  openai-fast: "openai/gpt-4o-mini"
  openai-powerful: "openai/gpt-4o"

  # ── Anthropic Claude (zukünftig, wenn ANTHROPIC_API_KEY gesetzt) ──
  claude-sonnet: "anthropic/claude-sonnet-4-6"
  claude-haiku: "anthropic/claude-haiku-4-5-20251001"

# Per-model defaults — drop_params=True in LiteLLM filtert nicht
# unterstützte Felder pro Provider.
model_params:
  gpt-5.4-mini:
    reasoning_effort: "medium"
    max_tokens: 16384

  gpt-5.4-nano:
    reasoning_effort: "low"
    max_tokens: 8000

  gpt-4.1:
    temperature: 0.2
    max_tokens: 16384

  gpt-4o-mini:
    temperature: 0.4
    max_tokens: 8000

  gpt-4o:
    temperature: 0.4
    max_tokens: 8000

  anthropic/claude-sonnet-4-6:
    max_tokens: 16384
    temperature: 1.0

  anthropic/claude-haiku-4-5-20251001:
    max_tokens: 8192
    temperature: 1.0

default_params:
  temperature: 0.7
  max_tokens: 8000

retry:
  max_attempts: 3
  backoff_multiplier: 2
  timeout: 60

logging:
  log_prompts: false
  log_completions: false
  log_token_usage: true
  log_latency: true
  log_parameter_mapping: true

tracing:
  enabled: true
  mode: "file"
  file_config:
    path: "traces/llm_traces.jsonl"

# Komplexitäts-Klassifizierung kann teuer werden, lassen wir für MVP aus.
task_complexity:
  enabled: false

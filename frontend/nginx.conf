server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed build assets
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every unknown path serves index.html so React Router
    # can handle routes like /verify-email, /login, /dashboard, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
